{% extends "admin-base.html" %}

{% block additional_styles %}
<style>
.lessons-hero {
	background: linear-gradient(116deg, #0d1b2a 0%, #1b263b 54%, #415a77 100%);
	color: #fff;
	border-radius: 1rem;
	padding: 1.25rem 1.4rem;
}

.calendar-shell {
	border: 1px solid #dfe5ec;
	border-radius: 1rem;
	background: #fff;
}

.legend-dot {
	display: inline-block;
	width: 0.7rem;
	height: 0.7rem;
	border-radius: 999px;
	margin-right: 0.35rem;
}

.legend-item {
	font-size: 0.9rem;
	color: #6c757d;
}
</style>
{% endblock %}

{% block subpage_content %}
<div class="container-fluid px-0">
	<div class="lessons-hero mb-4 shadow-sm">
		<div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
			<div>
				<h2 class="mb-1">All Lessons</h2>
				<p class="mb-0 opacity-75">View all scheduled sessions across instructors and students.</p>
			</div>
			<div class="d-flex flex-wrap gap-3 align-items-center">
				<span class="legend-item"><span class="legend-dot" style="background:#0d6efd"></span>Scheduled</span>
				<span class="legend-item"><span class="legend-dot" style="background:#198754"></span>Completed</span>
				<span class="legend-item"><span class="legend-dot" style="background:#dc3545"></span>Cancelled</span>
			</div>
		</div>
	</div>

	<div class="calendar-shell shadow-sm p-3 p-md-4">
		<div id="calendar"></div>
	</div>
</div>
{% endblock %}

{% block subpage_scripts %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
<script id="lessons-data" type="application/json">{{ lessons|tojson }}</script>
<script>
const lessons = JSON.parse(document.getElementById("lessons-data").textContent || "[]");

document.addEventListener("DOMContentLoaded", function () {
	const events = [];

	for (const lesson of lessons) {
		const status = lesson.status || "scheduled";
		const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
		const color = status === "scheduled" ? "#0d6efd" : status === "completed" ? "#198754" : status === "cancelled" ? "#dc3545" : "#6c757d";

		const studentName = lesson.student_name || "Unassigned Student";
		const instructorName = lesson.instructor_name || "Unassigned Instructor";

		events.push({
			id: lesson.id,
			title: `${studentName} - ${instructorName}`,
			start: lesson.date,
			allDay: false,
			color: color,
			extendedProps: {
				statusLabel: statusLabel,
			}
		});
	}

	const calendarEl = document.getElementById("calendar");
	const calendar = new FullCalendar.Calendar(calendarEl, {
		initialView: "dayGridMonth",
		height: "auto",
		headerToolbar: {
			left: "prev,next today",
			center: "title",
			right: "dayGridMonth,timeGridWeek,timeGridDay",
		},
		events: events,
	});

	calendar.render();
});
</script>
{% endblock %}
